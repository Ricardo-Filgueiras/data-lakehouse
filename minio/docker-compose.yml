version: '3.8'
services:
  minio:
    image: minio/minio:RELEASE.2024-07-16T23-46-41Z-cpuv1
    container_name: minio
    networks:
      - src_lakehouse
    ports:
      - 9000:9000
      - 9001:9001
    command: server /data --console-address ":9001"
    volumes:
      - minio:/data
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    extra_hosts:
      - "host.docker.internal:host-gateway"

  createbucket:
    image: minio/minio:RELEASE.2024-07-16T23-46-41Z-cpuv1
    container_name: createbucket
    depends_on:
      - minio
    networks:
      - src_lakehouse
    entrypoint: ["/bin/sh", "-c", "sleep 10; /usr/bin/mc alias set myminio http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD}; /usr/bin/mc mb --ignore-existing myminio/landing; /usr/bin/mc mb --ignore-existing myminio/bronze; /usr/bin/mc mb --ignore-existing myminio/silver; /usr/bin/mc mb --ignore-existing myminio/gold;"]

networks:
  src_lakehouse:
    external: true

volumes:
  minio:
